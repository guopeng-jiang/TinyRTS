    let el = document.getElementById('event-list');
    el.innerHTML = eventLog.map(e =>
        `<div class="event-line ${e.level}"><span class="event-time">${e.time}</span>${e.message}</div>`
    ).join('');
}

// --- TOOLTIP ---
function updateTooltip() {
    let tip = document.getElementById('tooltip');
    let wx = mouse.x / TILE_SIZE + camera.x;
    let wy = mouse.y / TILE_SIZE + camera.y;
    let found = null;

    for (let s of structures) {
        if (s.type === 'Relay' && fog[s.y][s.x] !== 2) continue;
        if (fog[s.y] && fog[s.y][s.x] !== 0 && distance(wx, wy, s.x, s.y) < 1.6) {
            found = { kind: 'building', entity: s };
            break;
        }
    }

    if (!found) {
        for (let u of units) {
            let isVisible = (buffs.listening === 1) || (u.owner === 1) || (fog[Math.floor(u.y)] && fog[Math.floor(u.y)][Math.floor(u.x)] === 2);
            if (!isVisible) continue;
            if (distance(wx, wy, u.x, u.y) < 0.6) {
                found = { kind: 'unit', entity: u };
                break;
            }
        }
    }

    if (!found) {
        tip.style.display = 'none';
        return;
    }

    if (found.kind === 'building') {
        let s = found.entity;
        let b = BUILDINGS[s.type];
        let ownerStr = s.owner === 1 ? 'You' : s.owner === 2 ? 'Enemy' : (s.hp <= 0 ? 'NEUTRALIZED' : 'Neutral');
        let html = `<div class="tt-title">${b.icon} ${s.type}</div>`;
        html += `<div class="tt-row">Owner: <span>${ownerStr}</span></div>`;
        if (s.maxHp > 0) html += `<div class="tt-row">HP: <span>${Math.max(0, Math.ceil(s.hp))}/${s.maxHp}</span></div>`;
        if (b.income > 0) html += `<div class="tt-row">Income: <span>+${b.income}/s</span></div>`;
        if (b.capTime < 999) html += `<div class="tt-row">Capture Time: <span>${b.capTime}s</span></div>`;
        if (b.vision > 0) html += `<div class="tt-row">Vision: <span>${b.vision}</span></div>`;
        if (b.defense > 0) html += `<div class="tt-row">Defense Radius: <span>${b.defense}</span></div>`;
        if (s.connected === false && s.owner === 1) html += `<div class="tt-row" style="color:#ef4444;">DISCONNECTED</div>`;
        if (s.owner === 0 && s.hp <= 0) html += `<div class="tt-row" style="color:#facc15;">Send infantry to capture!</div>`;
        if (s.owner !== 0 && s.hp < s.maxHp) html += `<div class="tt-row" style="color:#4ade80;">Auto-repairing...</div>`;
        if (b.desc) html += `<div class="tt-desc">${b.desc}</div>`;
        html += `<div class="tt-row" style="color:#6b7280;margin-top:4px;">Sector ${getSector(s.x,s.y)}</div>`;
        tip.innerHTML = html;
    } else {
        let u = found.entity;
        let d = UNIT_DATA[u.type];
        let ownerStr = u.owner === 1 ? 'You' : 'Enemy';
        let html = `<div class="tt-title">${d.icon} ${u.type}</div>`;
        html += `<div class="tt-row">Owner: <span>${ownerStr}</span></div>`;
        html += `<div class="tt-row">Role: <span>${d.role}</span></div>`;
        html += `<div class="tt-row">HP: <span>${Math.ceil(u.hp)}/${d.hp}</span></div>`;
        if (d.attack > 0) html += `<div class="tt-row">Attack: <span>${d.attack}</span></div>`;
        html += `<div class="tt-row">Vision: <span>${d.vision}</span></div>`;
        html += `<div class="tt-row">Speed: <span>${d.speed}</span></div>`;
        if (d.desc) html += `<div class="tt-desc">${d.desc}</div>`;
        tip.innerHTML = html;
    }

    tip.style.display = 'block';
    let tipW = tip.offsetWidth;
    let tipH = tip.offsetHeight;
    let tx = mouse.x + 15;
    let ty = mouse.y + 15;
    if (tx + tipW > window.innerWidth - 10) tx = mouse.x - tipW - 15;
    if (ty + tipH > window.innerHeight - 10) ty = mouse.y - tipH - 15;
    tip.style.left = tx + 'px';
    tip.style.top = ty + 'px';
}

function distance(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

// --- INPUT ---
canvas.addEventListener('mousedown', e => {
    if (e.button === 0) {
        mouse.isDown = true; mouse.startX = e.clientX; mouse.startY = e.clientY;
        mouse.isRightClick = false; selection = [];
    } else if (e.button === 2) {
        let tx = (e.clientX / TILE_SIZE) + camera.x;
        let ty = (e.clientY / TILE_SIZE) + camera.y;
        
        // Spawn Right-Click Move Ring
        if (selection.length > 0) {
            moveRings.push({ x: tx, y: ty, radius: 0.1, life: 30, maxLife: 30 });
        }
        
        selection.forEach(u => {
            setPath(u, tx + (Math.random()-0.5)*1.5, ty + (Math.random()-0.5)*1.5);
        });
    }
});

canvas.addEventListener('mousemove', e => {
    mouse.x = e.clientX; mouse.y = e.clientY;
    mouse.worldX = mouse.x / TILE_SIZE + camera.x;
    mouse.worldY = mouse.y / TILE_SIZE + camera.y;

    const edge = 50;
    if (mouse.x < edge) camera.x -= 0.6;
    if (mouse.x > canvas.width - edge) camera.x += 0.6;
    if (mouse.y < edge) camera.y -= 0.6;
    if (mouse.y > canvas.height - edge) camera.y += 0.6;

    clampCamera();
    updateTooltip();
});

canvas.addEventListener('mouseup', e => {
    if (e.button === 0) {
        mouse.isDown = false;
        let minX = (Math.min(mouse.startX, mouse.x) / TILE_SIZE) + camera.x;
        let maxX = (Math.max(mouse.startX, mouse.x) / TILE_SIZE) + camera.x;
        let minY = (Math.min(mouse.startY, mouse.y) / TILE_SIZE) + camera.y;
        let maxY = (Math.max(mouse.startY, mouse.y) / TILE_SIZE) + camera.y;

        if (Math.abs(mouse.startX - mouse.x) < 5 && Math.abs(mouse.startY - mouse.y) < 5) {
            minX -= 0.5; maxX += 0.5; minY -= 0.5; maxY += 0.5;
        }

        units.forEach(u => {
            if (u.owner === 1 && u.x >= minX && u.x <= maxX && u.y >= minY && u.y <= maxY) selection.push(u);
        });
    }
});

canvas.addEventListener('contextmenu', e => e.preventDefault());

window.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.key === 'h' || e.key === 'H') {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        e.preventDefault();
        jumpToHQ();
    }
});

window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

init();
</script>
